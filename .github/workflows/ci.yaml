name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dprint
        run: curl -fsSL https://dprint.dev/install.sh | sh && echo "$HOME/.dprint/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: dprint check

  lint-and-unit-test:
    name: Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.2

      - name: Helm lint
        run: |
          for chart in charts/*/; do
            echo "==> Linting ${chart}..."
            helm lint "${chart}"
          done

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false

      - name: Run unit tests
        run: |
          for chart in charts/*/; do
            if [ -d "${chart}/tests" ]; then
              echo "==> Testing ${chart}..."
              helm unittest "${chart}"
            fi
          done

  e2e-sqlite:
    name: E2E — SQLite
    runs-on: ubuntu-latest
    needs: lint-and-unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.0.2

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: helms-e2e

      - name: Run e2e test (sqlite)
        run: ci/scripts/e2e.sh sqlite

      - name: Show debug info on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl -n netbird-e2e get pods -o wide || true
          echo "=== Server logs ==="
          kubectl -n netbird-e2e logs deployment/netbird-e2e-server --all-containers --tail=100 || true
          echo "=== Dashboard logs ==="
          kubectl -n netbird-e2e logs deployment/netbird-e2e-dashboard --tail=100 || true
          echo "=== Events ==="
          kubectl -n netbird-e2e get events --sort-by='.lastTimestamp' || true

  e2e-postgres:
