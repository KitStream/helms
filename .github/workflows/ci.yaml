name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit-test:
    name: Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Helm lint
        run: |
          for chart in charts/*/; do
            echo "==> Linting ${chart}..."
            helm lint "${chart}"
          done

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git

      - name: Run unit tests
        run: |
          for chart in charts/*/; do
            if [ -d "${chart}/tests" ]; then
              echo "==> Testing ${chart}..."
              helm unittest "${chart}"
            fi
          done

  e2e-test:
    name: E2E Test (kind)
    runs-on: ubuntu-latest
    needs: lint-and-unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: helms-e2e

      - name: Install netbird chart
        run: |
          helm install netbird-e2e charts/netbird \
            -n netbird-e2e --create-namespace \
            -f charts/netbird/ci/e2e-values.yaml \
            --wait --timeout 3m

      - name: Verify deployments are ready
        run: |
          kubectl -n netbird-e2e rollout status deployment/netbird-e2e-netbird-server --timeout=120s
          kubectl -n netbird-e2e rollout status deployment/netbird-e2e-netbird-dashboard --timeout=120s

      - name: Show pod status
        if: always()
        run: |
          kubectl -n netbird-e2e get pods -o wide
          echo "---"
          kubectl -n netbird-e2e get svc

      - name: Run helm test
        run: helm test netbird-e2e -n netbird-e2e --timeout 2m

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Server logs ==="
          kubectl -n netbird-e2e logs deployment/netbird-e2e-netbird-server --all-containers --tail=100 || true
          echo "=== Dashboard logs ==="
          kubectl -n netbird-e2e logs deployment/netbird-e2e-netbird-dashboard --tail=100 || true
          echo "=== Events ==="
          kubectl -n netbird-e2e get events --sort-by='.lastTimestamp' || true

      - name: Cleanup
        if: always()
        run: |
          helm uninstall netbird-e2e -n netbird-e2e --ignore-not-found || true
          kubectl delete namespace netbird-e2e --ignore-not-found || true

