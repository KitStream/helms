apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "keycloak.fullname" . }}-test"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.allLabels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: busybox:1.37
      command: ['sh', '-c']
      args:
        - |
          set -e
          FAIL=0

          echo "==> Testing Keycloak health endpoint..."
          RESPONSE=$(wget -qO- --timeout=10 http://{{ include "keycloak.fullname" . }}:{{ .Values.service.managementPort }}/health/ready 2>&1) || {
            echo "FAIL: could not reach health endpoint"
            FAIL=1
          }

          if [ "$FAIL" -eq 0 ]; then
            echo "Response: $RESPONSE"
            case "$RESPONSE" in
              *UP*)
                echo "PASS: Keycloak health check returned UP"
                ;;
              *)
                echo "FAIL: unexpected health response: $RESPONSE"
                FAIL=1
                ;;
            esac
          fi

          echo ""
          if [ "$FAIL" -ne 0 ]; then
            echo "Some tests FAILED"
            exit 1
          fi
          echo "All tests PASSED"
