apiVersion: v1
kind: Service
metadata:
  name: {{ include "keycloak.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.allLabels" . | nindent 4 }}
  {{- with .Values.headlessService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  clusterIP: None
  # JGroups discovery must resolve peers before they are Ready, otherwise
  # simultaneously started replicas form singleton clusters and merge late
  # (split-brain), leaving stale caches on the minority side.
  publishNotReadyAddresses: true
  ports:
    - name: jgroups
      port: {{ .Values.headlessService.jgroupsPort }}
      targetPort: jgroups
      protocol: TCP
  selector:
    {{- include "keycloak.selectorLabels" . | nindent 4 }}
