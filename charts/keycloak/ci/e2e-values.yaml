# E2E test values — dev mode (embedded H2) in a kind cluster.
#
# This configuration:
# - Uses the embedded H2 dev database (no external DB)
# - Sets admin credentials for API testing
# - Increases startup probe tolerance for slow CI environments

database:
  type: dev

admin:
  username: admin
  password:
    secretName: keycloak-admin-password
    secretKey: password

startupProbe:
  httpGet:
    path: /health/started
    port: management
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 120
  timeoutSeconds: 3
