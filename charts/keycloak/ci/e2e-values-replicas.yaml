# E2E test values — multi-replica with kubernetes (dns-ping) cache stack.
#
# Tests that multiple Keycloak pods can form a cluster using the
# headless service for JGroups DNS discovery.

replicaCount: 2

database:
  type: postgresql
  host: "postgres.keycloak-e2e.svc.cluster.local"
  port: 5432
  user: keycloak
  name: keycloak
  password:
    secretName: keycloak-db-password
    secretKey: password

cache:
  stack: kubernetes

admin:
  username: admin
  password:
    secretName: keycloak-admin-password
    secretKey: password

startupProbe:
  httpGet:
    path: /health/started
    port: management
  initialDelaySeconds: 30
  periodSeconds: 5
  failureThreshold: 120
  timeoutSeconds: 3
