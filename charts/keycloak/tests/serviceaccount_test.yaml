suite: serviceaccount tests
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-keycloak

  - it: should not create a ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name when set
    set:
      serviceAccount.name: my-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-sa

  - it: should add annotations
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role

  - it: should include imagePullSecrets from global level
    set:
      imagePullSecrets:
        - name: global-registry
    asserts:
      - contains:
          path: imagePullSecrets
          content:
            name: global-registry

  - it: should include common labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            helm.sh/chart: keycloak-26.5.0
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/version: "26.5.0"
