suite: server gRPC service tests
templates:
  - templates/server-grpc-service.yaml
tests:
  - it: should not render when grpcRoute is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when grpcService is disabled even if grpcRoute is enabled
    set:
      server.grpcRoute.enabled: true
      server.grpcService.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when grpcRoute is enabled
    set:
      server.grpcRoute.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service

  - it: should have -grpc suffix in name
    set:
      server.grpcRoute.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-netbird-server-grpc

  - it: should carry the h2c appProtocol by default
    set:
      server.grpcRoute.enabled: true
    asserts:
      - contains:
          path: spec.ports
          content:
            name: grpc
            port: 80
            targetPort: http
            protocol: TCP
            appProtocol: kubernetes.io/h2c

  - it: should allow overriding appProtocol and port
    set:
      server.grpcRoute.enabled: true
      server.grpcService.appProtocol: custom/h2c
      server.grpcService.port: 8443
    asserts:
      - contains:
          path: spec.ports
          content:
            name: grpc
            port: 8443
            targetPort: http
            protocol: TCP
            appProtocol: custom/h2c

  - it: should share the server selector labels
    set:
      server.grpcRoute.enabled: true
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server

  - it: should apply custom annotations
    set:
      server.grpcRoute.enabled: true
      server.grpcService.annotations:
        example.com/foo: bar
    asserts:
      - equal:
          path: metadata.annotations["example.com/foo"]
          value: bar
