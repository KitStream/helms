suite: server PVC tests
templates:
  - templates/server-pvc.yaml
tests:
  - it: should create a PVC when enabled
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim

  - it: should not create a PVC when disabled
    set:
      server.persistentVolume.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use default size of 1Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: should use custom size
    set:
      server.persistentVolume.size: 10Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: should use ReadWriteOnce access mode by default
    asserts:
      - contains:
          path: spec.accessModes
          content: ReadWriteOnce

  - it: should set storage class when specified
    set:
      server.persistentVolume.storageClass: gp3
    asserts:
      - equal:
          path: spec.storageClassName
          value: gp3

  - it: should not set storage class when empty
    asserts:
      - notExists:
          path: spec.storageClassName

  - it: should add annotations when specified
    set:
      server.persistentVolume.annotations:
        backup: "true"
    asserts:
      - equal:
          path: metadata.annotations.backup
          value: "true"

  - it: should include server labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server

