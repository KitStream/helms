suite: PAT seed job tests
templates:
  - templates/pat-seed-job.yaml
tests:
  # ── Not rendered when disabled ───────────────────────────────────────

  - it: should not render when pat.enabled is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when pat is not configured
    set:
      pat.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # ── Not rendered for SQLite (uses sidecar instead) ─────────────────

  - it: should not render for sqlite even when pat.enabled is true
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render for sqlite with PV enabled
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
      server.persistentVolume.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  # ── Basic rendering (external DB only) ─────────────────────────────

  - it: should render a Job for postgresql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job

  - it: should render a Job for mysql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: mysql
      database.host: mysql.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: mysql-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job

  - it: should have correct helm hook annotations
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "5"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation"

  - it: should include pat-seed component label
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: pat-seed

  # ── Init container: wait-server ──────────────────────────────────────

  - it: should have wait-server init container using initium
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-server
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "ghcr.io/kitstream/initium:2.0.0"
      - contains:
          path: spec.template.spec.initContainers[0].args
          content: "tcp://RELEASE-NAME-netbird-server:80"

  - it: should set hardened securityContext on wait-server
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: true

  # ── Init container: db-seed ──────────────────────────────────────────

  - it: should have db-seed init container using initium
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: db-seed
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: "ghcr.io/kitstream/initium:2.0.0"

  - it: should inject PAT_TOKEN into db-seed init container
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      pat.secret.tokenKey: myTokenKey
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: PAT_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-pat-secret
                key: myTokenKey

  - it: should inject DB_PASSWORD for postgresql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
      database.passwordSecret.secretKey: dbpass
    asserts:
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pg-secret
                key: dbpass

  - it: should inject DB_PASSWORD for mysql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: mysql
      database.host: mysql.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: mysql-secret
    asserts:
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: mysql-secret
                key: password

  # ── Main container: api-provision ──────────────────────────────────

  - it: should have api-provision container using alpine
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: api-provision
      - equal:
          path: spec.template.spec.containers[0].image
          value: "alpine:3.20"

  - it: should inject PAT_TOKEN into api-provision container
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      pat.secret.tokenKey: myTokenKey
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PAT_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-pat-secret
                key: myTokenKey

  - it: should mount config volume on api-provision
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /spec
            readOnly: true

  - it: should run api-provision non-root
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 65534

  # ── Volumes ──────────────────────────────────────────────────────────

  - it: should have config volume from configmap
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: RELEASE-NAME-netbird-server-pat-seed

  # ── Job spec ─────────────────────────────────────────────────────────

  - it: should have correct backoffLimit and ttl
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 3
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 300

  - it: should set restartPolicy to OnFailure
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: OnFailure
