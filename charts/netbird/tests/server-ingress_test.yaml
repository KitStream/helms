suite: server ingress tests
templates:
  - templates/server-ingress.yaml
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      server.ingress.enabled: true
      server.ingress.hosts:
        - host: netbird.example.com
          paths:
            - path: /api
              pathType: ImplementationSpecific
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Ingress

  - it: should set ingress class name
    set:
      server.ingress.enabled: true
      server.ingress.className: nginx
      server.ingress.hosts:
        - host: netbird.example.com
          paths:
            - path: /api
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should set annotations
    set:
      server.ingress.enabled: true
      server.ingress.annotations:
        cert-manager.io/cluster-issuer: letsencrypt
      server.ingress.hosts:
        - host: netbird.example.com
          paths:
            - path: /api
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            cert-manager.io/cluster-issuer: letsencrypt

  - it: should set host and paths
    set:
      server.ingress.enabled: true
      server.ingress.hosts:
        - host: netbird.example.com
          paths:
            - path: /api
              pathType: ImplementationSpecific
            - path: /oauth2
              pathType: ImplementationSpecific
    asserts:
      - equal:
          path: spec.rules[0].host
          value: netbird.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /api
      - equal:
          path: spec.rules[0].http.paths[1].path
          value: /oauth2

  - it: should set TLS
    set:
      server.ingress.enabled: true
      server.ingress.hosts:
        - host: netbird.example.com
          paths:
            - path: /api
      server.ingress.tls:
        - secretName: netbird-tls
          hosts:
            - netbird.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: netbird-tls
      - contains:
          path: spec.tls[0].hosts
          content: netbird.example.com
