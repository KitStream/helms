suite: server generated secret tests
templates:
  - templates/server-generated-secret.yaml
tests:
  - it: should create a Secret when autoGenerate is true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: should have helm resource-policy keep annotation
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            helm.sh/resource-policy: keep

  - it: should include authSecret key
    asserts:
      - exists:
          path: data.authSecret

  - it: should include encryptionKey key
    asserts:
      - exists:
          path: data.encryptionKey

  - it: should not create Secret when external secretNames are set
    set:
      server.secrets.authSecret.secretName: external-auth
      server.secrets.authSecret.autoGenerate: false
      server.secrets.storeEncryptionKey.secretName: external-enc
      server.secrets.storeEncryptionKey.autoGenerate: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create Secret with only authSecret when only auth autoGenerate is true
    set:
      server.secrets.storeEncryptionKey.secretName: external-enc
      server.secrets.storeEncryptionKey.autoGenerate: false
    asserts:
      - hasDocuments:
          count: 1
      - exists:
          path: data.authSecret
      - notExists:
          path: data.encryptionKey

  - it: should create Secret with only encryptionKey when only enc autoGenerate is true
    set:
      server.secrets.authSecret.secretName: external-auth
      server.secrets.authSecret.autoGenerate: false
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: data.authSecret
      - exists:
          path: data.encryptionKey

  - it: should include server labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server

  # ── Relay secret (issue #83) ──────────────────────────────────────────

  - it: should not include relaySecret key when relays are not configured
    set:
      server.secrets.relaySecret.autoGenerate: true
    asserts:
      - notExists:
          path: data.relaySecret

  - it: should include relaySecret key when autoGenerate and relays addresses set
    set:
      server.config.relays.addresses:
        - "rels://relay.example.com:443"
      server.secrets.relaySecret.autoGenerate: true
    asserts:
      - exists:
          path: data.relaySecret

  - it: should not include relaySecret key when external secretName provided
    set:
      server.config.relays.addresses:
        - "rels://relay.example.com:443"
      server.secrets.relaySecret.secretName: external-relay
      server.secrets.relaySecret.autoGenerate: false
    asserts:
      - notExists:
          path: data.relaySecret

  - it: should create Secret with only relaySecret when other autoGenerate flags off
    set:
      server.secrets.authSecret.secretName: external-auth
      server.secrets.authSecret.autoGenerate: false
      server.secrets.storeEncryptionKey.secretName: external-enc
      server.secrets.storeEncryptionKey.autoGenerate: false
      server.config.relays.addresses:
        - "rels://relay.example.com:443"
      server.secrets.relaySecret.autoGenerate: true
    asserts:
      - hasDocuments:
          count: 1
      - notExists:
          path: data.authSecret
      - notExists:
          path: data.encryptionKey
      - exists:
          path: data.relaySecret
