suite: PAT seed configmap tests
templates:
  - templates/pat-seed-configmap.yaml
tests:
  - it: should not render when pat.enabled is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when pat.enabled is true
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap

  # ── Hook annotations: only for external databases ──────────────────

  - it: should not have helm hook annotations for sqlite
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/hook"]

  - it: should have helm hook annotations for postgresql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: pg-secret
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade"
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "0"

  - it: should have helm hook annotations for mysql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: mysql
      database.host: mysql.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: mysql-secret
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade"

  # ── Seed spec content ──────────────────────────────────────────────

  - it: should contain pat-seed.yaml key
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
    asserts:
      - exists:
          path: data["pat-seed.yaml"]

  - it: should match seed spec snapshot for sqlite
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: sqlite
      pat.accountId: test-account
      pat.userId: test-user
      pat.name: test-pat-name
    asserts:
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "driver: sqlite"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "url: \"/var/lib/netbird/store.db\""
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "id: \"test-account\""
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "id: \"test-user\""
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "name: \"test-pat-name\""

  - it: should use postgresql database URL when database.type is postgresql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: postgresql
      database.host: pg.example.com
      database.port: 5432
      database.user: netbird
      database.name: netbird
      database.sslMode: disable
      database.passwordSecret.secretName: pg-secret
    asserts:
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "driver: postgres"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "host: pg\\.example\\.com"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "user: netbird"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "password:"

  - it: should use mysql database URL when database.type is mysql
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
      database.type: mysql
      database.host: mysql.example.com
      database.user: netbird
      database.name: netbird
      database.passwordSecret.secretName: mysql-secret
    asserts:
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "driver: mysql"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "host: mysql\\.example\\.com"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "user: netbird"

  - it: should wait for required tables
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
    asserts:
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "name: personal_access_tokens"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "name: users"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "name: accounts"

  - it: should use reconcile mode on seed sets
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
    asserts:
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "mode: reconcile"

  - it: should compute hashed_token from PAT_TOKEN via sha256 and base64_encode
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
    asserts:
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: 'env\.PAT_TOKEN \| sha256\("bytes"\) \| base64_encode'

  - it: should seed account user and pat tables only
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
    asserts:
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "table: accounts"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "table: users"
      - matchRegex:
          path: data["pat-seed.yaml"]
          pattern: "table: personal_access_tokens"

  - it: should contain provision.sh script
    set:
      pat.enabled: true
      pat.secret.secretName: my-pat-secret
    asserts:
      - exists:
          path: data["provision.sh"]
      - matchRegex:
          path: data["provision.sh"]
          pattern: "api/groups"
      - matchRegex:
          path: data["provision.sh"]
          pattern: "api/policies"
