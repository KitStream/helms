suite: dashboard service tests
templates:
  - templates/dashboard-service.yaml
tests:
  - it: should render a Service
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service

  - it: should use ClusterIP type by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose http port 80
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should include selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: dashboard

