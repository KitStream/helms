suite: server service tests
templates:
  - templates/server-service.yaml
tests:
  - it: should render a Service
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service

  - it: should use ClusterIP type by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose http port 80
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should use custom service type
    set:
      server.service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: should use custom port
    set:
      server.service.port: 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP

  - it: should include selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: netbird
            app.kubernetes.io/component: server
