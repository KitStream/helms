# E2E test values — PostgreSQL backend in a kind cluster.
#
# Requires: PostgreSQL deployed in the same namespace before chart install.
# The e2e script deploys postgres via a simple Deployment + Service.

server:
  persistentVolume:
    enabled: false

  stunService:
    type: ClusterIP

  config:
    exposedAddress: "https://netbird.localhost"
    auth:
      issuer: "https://auth.localhost"
      dashboardRedirectURIs:
        - "https://netbird.localhost/nb-auth"
        - "https://netbird.localhost/nb-silent-auth"
    store:
      engine: postgres

  secrets:
    storeDsn:
      secretName: netbird-db-dsn
      secretKey: dsn

  livenessProbe:
    failureThreshold: 10
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    tcpSocket:
      port: http
  readinessProbe:
    failureThreshold: 10
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    tcpSocket:
      port: http

dashboard:
  config:
    mgmtApiEndpoint: "https://netbird.localhost"
    mgmtGrpcApiEndpoint: "https://netbird.localhost"
    authAuthority: "https://auth.localhost"
    authClientId: "test-client"
    authAudience: "test-audience"


