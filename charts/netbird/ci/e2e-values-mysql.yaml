# E2E test values — MySQL backend in a kind cluster.
#
# The e2e script deploys mysql via a simple Deployment + Service
# and creates the password secret before chart install.

database:
  type: mysql
  host: "mysql.netbird-e2e.svc.cluster.local"
  port: 3306
  user: netbird
  name: netbird
  passwordSecret:
    secretName: netbird-db-password
    secretKey: password

server:
  persistentVolume:
    enabled: false

  stunService:
    type: ClusterIP

  config:
    exposedAddress: "https://netbird.localhost"
    auth:
      issuer: "https://auth.localhost"
      dashboardRedirectURIs:
        - "https://netbird.localhost/nb-auth"
        - "https://netbird.localhost/nb-silent-auth"

  livenessProbe:
    failureThreshold: 10
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    tcpSocket:
      port: http
  readinessProbe:
    failureThreshold: 10
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    tcpSocket:
      port: http

dashboard:
  config:
    mgmtApiEndpoint: "https://netbird.localhost"
    mgmtGrpcApiEndpoint: "https://netbird.localhost"
    authAuthority: "https://auth.localhost"
    authClientId: "test-client"
    authAudience: "test-audience"
