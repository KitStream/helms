{{/*
Post-install/post-upgrade Job - seeds a Personal Access Token into the
NetBird database via Initium seed command. Only rendered when
pat.enabled is true.
*/}}
{{- if .Values.pat.enabled }}
{{- $isExternal := eq (include "netbird.database.isExternal" .) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "netbird.server.fullname" . }}-pat-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "netbird.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pat-seed
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "netbird.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pat-seed
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "netbird.serviceAccountName" . }}
      {{- with (coalesce .Values.server.imagePullSecrets .Values.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-server
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - wait-for
            - --target
            - "tcp://{{ include "netbird.server.fullname" . }}:{{ .Values.server.service.port }}"
            - --timeout
            - "180s"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: pat-seed
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - seed
            - --spec
            - /spec/pat-seed.yaml
          env:
            - name: PAT_HASHED_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pat.secret.secretName }}
                  key: {{ .Values.pat.secret.hashedTokenKey }}
            {{- if $isExternal }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret.secretName }}
                  key: {{ .Values.database.passwordSecret.secretKey }}
            {{- end }}
          securityContext:
            {{- if eq .Values.database.type "sqlite" }}
            runAsUser: 0
            {{- else }}
            runAsNonRoot: true
            runAsUser: 65534
            {{- end }}
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /spec
              readOnly: true
            {{- if eq .Values.database.type "sqlite" }}
            - name: data
              mountPath: /var/lib/netbird
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "netbird.server.fullname" . }}-pat-seed
        {{- if eq .Values.database.type "sqlite" }}
        - name: data
          {{- if .Values.server.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "netbird.server.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
