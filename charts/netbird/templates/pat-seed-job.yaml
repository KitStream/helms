{{/*
Post-install/post-upgrade Job — seeds account, user, and PAT into the
database via Initium, then provisions the "All" group and default policy
via the NetBird REST API.

Only rendered for external databases (PostgreSQL/MySQL) where the seed
connects over the network. For SQLite the seed runs as a sidecar container
in the server Deployment to share the same PVC (ReadWriteOnce PVCs do not
support multi-pod attach).
*/}}
{{- if .Values.pat.enabled }}
  {{- $isExternal := eq (include "netbird.database.isExternal" .) "true" }}
  {{- if $isExternal }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "netbird.server.fullname" . }}-pat-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "netbird.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: pat-seed
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "netbird.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: pat-seed
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "netbird.serviceAccountName" . }}
    {{- with (coalesce .Values.server.imagePullSecrets .Values.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      initContainers:
        - name: wait-server
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - wait-for
            - --target
            - "tcp://{{ include "netbird.server.fullname" . }}:{{ .Values.server.service.port }}"
            - --timeout
            - "180s"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
        - name: db-seed
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - seed
            - --spec
            - /spec/pat-seed.yaml
          env:
            - name: PAT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pat.secret.secretName }}
                  key: {{ .Values.pat.secret.tokenKey }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecret.secretName }}
                  key: {{ .Values.database.passwordSecret.secretKey }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /spec
              readOnly: true
      containers:
        - name: api-provision
          image: alpine:3.20
          command: ["sh", "/spec/provision.sh"]
          env:
            - name: PAT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pat.secret.secretName }}
                  key: {{ .Values.pat.secret.tokenKey }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /spec
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "netbird.server.fullname" . }}-pat-seed
    {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
  {{- end }}
{{- end }}
