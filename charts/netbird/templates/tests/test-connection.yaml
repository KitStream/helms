{{/*
Helm test pod — verifies that the server and dashboard services are
reachable from within the cluster. Runs on `helm test <release>`.
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "netbird.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: test-server
      image: busybox:1.37
      command: ['sh', '-c']
      args:
        - |
          echo "Testing server service..."
          wget -qO- --timeout=5 http://{{ include "netbird.server.fullname" . }}:{{ .Values.server.service.port }}/ || true
          echo "Server service is reachable."

          echo "Testing dashboard service..."
          wget -qO- --timeout=5 http://{{ include "netbird.dashboard.fullname" . }}:{{ .Values.dashboard.service.port }}/ || true
          echo "Dashboard service is reachable."

          echo "All connectivity tests passed."

