apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbird.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include "netbird.server.configTemplate" . | sha256sum }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "netbird.server.selectorLabels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "netbird.serviceAccountName" . }}
      {{- with (coalesce .Values.server.imagePullSecrets .Values.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $generated := include "netbird.server.generatedSecretName" . }}
      {{- $authSecretName := include "netbird.server.resolveSecretName" (dict "ref" .Values.server.secrets.authSecret "generated" $generated) }}
      {{- $encKeySecretName := include "netbird.server.resolveSecretName" (dict "ref" .Values.server.secrets.storeEncryptionKey "generated" $generated) }}
      {{- $dsnSecretName := "" }}
      {{- if and (ne .Values.server.config.store.engine "sqlite") .Values.server.secrets.storeDsn.secretName }}
      {{- $dsnSecretName = .Values.server.secrets.storeDsn.secretName }}
      {{- end }}
      initContainers:
        - name: config-init
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          args:
            - render
            - --template
            - /tpl/config.yaml.tpl
            - --output
            - config.yaml
            - --workdir
            - /out
          env:
            - name: DOLLAR
              value: "$"
            {{- if $authSecretName }}
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $authSecretName }}
                  key: {{ .Values.server.secrets.authSecret.secretKey }}
            {{- else }}
            - name: AUTH_SECRET
              value: ""
            {{- end }}
            {{- if $encKeySecretName }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $encKeySecretName }}
                  key: {{ .Values.server.secrets.storeEncryptionKey.secretKey }}
            {{- else }}
            - name: ENCRYPTION_KEY
              value: ""
            {{- end }}
            {{- if $dsnSecretName }}
            - name: STORE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ $dsnSecretName }}
                  key: {{ .Values.server.secrets.storeDsn.secretKey }}
            {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config-tpl
              mountPath: /tpl
              readOnly: true
            - name: config-generated
              mountPath: /out
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args:
            - --config
            - /etc/netbird/config.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: stun
              containerPort: {{ .Values.server.stunPort }}
              protocol: UDP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: config-generated
              mountPath: /etc/netbird/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/netbird
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config-tpl
          configMap:
            name: {{ include "netbird.server.fullname" . }}
        - name: config-generated
          emptyDir: {}
        - name: data
          {{- if .Values.server.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "netbird.server.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

