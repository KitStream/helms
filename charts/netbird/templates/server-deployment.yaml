apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird.server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "netbird.server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include "netbird.server.configTemplate" . | sha256sum }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "netbird.server.selectorLabels" . | nindent 8 }}
        {{- with .Values.server.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "netbird.serviceAccountName" . }}
      {{- with (coalesce .Values.server.imagePullSecrets .Values.imagePullSecrets) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $generated := include "netbird.server.generatedSecretName" . }}
      {{- $authSecretName := include "netbird.server.resolveSecretName" (dict "ref" .Values.server.secrets.authSecret "generated" $generated) }}
      {{- $encKeySecretName := include "netbird.server.resolveSecretName" (dict "ref" .Values.server.secrets.storeEncryptionKey "generated" $generated) }}
      {{- $dsnSecretName := "" }}
      {{- if and (ne .Values.server.config.store.engine "sqlite") .Values.server.secrets.storeDsn.secretName }}
      {{- $dsnSecretName = .Values.server.secrets.storeDsn.secretName }}
      {{- end }}
      initContainers:
        - name: config-init
          image: "{{ .Values.server.initImage.repository }}:{{ .Values.server.initImage.tag }}"
          command: ["sh", "-c"]
          args:
            - |
              apk add --no-cache gettext-envsubst > /dev/null 2>&1
              export DOLLAR='$'
              {{- if $authSecretName }}
              export AUTH_SECRET=$(cat /secrets/auth-secret/{{ .Values.server.secrets.authSecret.secretKey }})
              {{- else }}
              export AUTH_SECRET=""
              {{- end }}
              {{- if $encKeySecretName }}
              export ENCRYPTION_KEY=$(cat /secrets/encryption-key/{{ .Values.server.secrets.storeEncryptionKey.secretKey }})
              {{- else }}
              export ENCRYPTION_KEY=""
              {{- end }}
              {{- if $dsnSecretName }}
              export STORE_DSN=$(cat /secrets/store-dsn/{{ .Values.server.secrets.storeDsn.secretKey }})
              {{- end }}
              envsubst < /tpl/config.yaml.tpl > /out/config.yaml
          volumeMounts:
            - name: config-tpl
              mountPath: /tpl
              readOnly: true
            - name: config-generated
              mountPath: /out
            {{- if $authSecretName }}
            - name: secret-auth
              mountPath: /secrets/auth-secret
              readOnly: true
            {{- end }}
            {{- if $encKeySecretName }}
            - name: secret-encryption-key
              mountPath: /secrets/encryption-key
              readOnly: true
            {{- end }}
            {{- if $dsnSecretName }}
            - name: secret-store-dsn
              mountPath: /secrets/store-dsn
              readOnly: true
            {{- end }}
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          args:
            - --config
            - /etc/netbird/config.yaml
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: stun
              containerPort: {{ .Values.server.stunPort }}
              protocol: UDP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: config-generated
              mountPath: /etc/netbird/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/netbird
          {{- with .Values.server.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config-tpl
          configMap:
            name: {{ include "netbird.server.fullname" . }}
        - name: config-generated
          emptyDir: {}
        {{- if $authSecretName }}
        - name: secret-auth
          secret:
            secretName: {{ $authSecretName }}
        {{- end }}
        {{- if $encKeySecretName }}
        - name: secret-encryption-key
          secret:
            secretName: {{ $encKeySecretName }}
        {{- end }}
        {{- if $dsnSecretName }}
        - name: secret-store-dsn
          secret:
            secretName: {{ $dsnSecretName }}
        {{- end }}
        - name: data
          {{- if .Values.server.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "netbird.server.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

