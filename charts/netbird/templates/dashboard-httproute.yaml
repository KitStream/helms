{{- if .Values.dashboard.httpRoute.enabled }}
{{- $serviceName := include "netbird.dashboard.fullname" . }}
{{- $rules := list }}
{{- range .Values.dashboard.httpRoute.rules }}
  {{- $rule := deepCopy . }}
  {{- if not (hasKey $rule "backendRefs") }}
    {{- $_ := set $rule "backendRefs" (list (dict "name" $serviceName "port" 80)) }}
  {{- end }}
  {{- $rules = append $rules $rule }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird.dashboard.labels" . | nindent 4 }}
    {{- with .Values.dashboard.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.dashboard.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.dashboard.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.dashboard.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $rules }}
  rules:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
